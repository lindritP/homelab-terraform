name: terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# id-token:write lets the azurerm provider mint a short-lived OIDC token.
permissions:
  id-token: write
  contents: read

# Never let two state-touching runs overlap.
concurrency:
  group: terraform
  cancel-in-progress: false

# The azurerm provider AND the azurerm backend read these automatically.
# No azure/login step is needed for Terraform.
env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}

jobs:
  plan:
    name: validate & plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init
      - run: terraform validate
      - run: terraform plan -no-color -input=false

  apply:
    name: apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production   # add a required reviewer here to gate applies
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform apply -input=false -auto-approve